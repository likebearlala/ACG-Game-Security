<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>危險曖昧模擬器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <section id="setup" class="setup-screen">
        <div class="setup-copy">
          <p class="kicker">單身開局的多線危險關係</p>
          <h1>危險曖昧模擬器</h1>
          <p class="content-warning">
            本版本保留欺瞞、試探、報復與關係失控等危險關係框架，但排除已婚、已有現任或既定伴侶設定。
            角色皆為成年人；親密內容以非露骨方式呈現。
          </p>
        </div>

        <div class="setup-panel">
          <div class="step-indicator">
            <span id="stepLabel">Step 1 / 7</span>
            <div><i id="stepBar"></i></div>
          </div>
          <h2 id="setupTitle">選擇身份</h2>
          <div id="setupOptions" class="option-grid"></div>
          <div id="customBox" class="custom-box hidden">
            <label for="customInput">自訂設定</label>
            <textarea id="customInput" rows="4" placeholder="輸入性別、職業、角色性格、危險關係起點或你想保留的秘密。"></textarea>
          </div>
          <button id="nextSetup" class="primary-btn">下一步</button>
        </div>
      </section>

      <section id="llmGate" class="llm-gate hidden">
        <div class="llm-gate-card">
          <p class="kicker">LLM API</p>
          <h2>開始遊戲前設定 LLM API Key</h2>
          <p id="llmGateDetail">使用 OpenAI-compatible Chat Completions 生成劇情。API Key 只保存在本頁記憶體，不會寫入存檔。</p>
          <div class="api-form">
            <label for="llmApiKey">API Key</label>
            <input id="llmApiKey" type="password" autocomplete="off" placeholder="sk-..." />
            <label for="llmEndpoint">API Endpoint</label>
            <input id="llmEndpoint" type="url" value="https://api.openai.com/v1/chat/completions" />
            <label for="llmModel">Model</label>
            <input id="llmModel" type="text" value="gpt-4o-mini" />
          </div>
          <strong id="llmGateStatus">尚未啟用</strong>
          <button id="startLlmBtn" type="button">使用 LLM API 進入遊戲</button>
          <button id="skipLlmBtn" type="button">體驗陽春版，不使用 LLM API</button>
        </div>
      </section>

      <section id="game" class="game-screen hidden">
        <aside class="sidebar">
          <div class="brand">
            <span>危險曖昧</span>
            <strong>第 <b id="weekNo">1</b> 週</strong>
          </div>
          <div class="portrait-stack">
            <article>
              <img id="playerAvatar" src="assets/lead-cutout.png" alt="玩家角色" />
              <div>
                <span>你</span>
                <strong id="playerRole">普通上班族</strong>
              </div>
            </article>
            <article>
              <img id="partnerAvatar" src="assets/partner-cutout.png" alt="主要攻略角色" />
              <div>
                <span>主要攻略角色</span>
                <strong id="partnerName">沈予安</strong>
                <small id="partnerProfile" class="profile-hint"></small>
              </div>
            </article>
            <article>
              <img id="dangerAvatar" src="assets/danger-cutout.png" alt="危險對象" />
              <div>
                <span>危險對象</span>
                <strong id="dangerName">林晏</strong>
                <small id="dangerProfile" class="profile-hint"></small>
              </div>
            </article>
          </div>
          <div id="stats" class="stats"></div>
          <div class="save-row">
            <button id="saveBtn" title="保存進度">保存</button>
            <button id="loadBtn" title="讀取進度">讀取</button>
            <button id="restartBtn" title="重新開始">重開</button>
          </div>
          <div class="ai-panel">
            <span id="llmStatus">LLM狀態：尚未設定</span>
          </div>
        </aside>

        <section class="story-wrap">
          <header class="story-hero">
            <img src="assets/city-cat-cutout.png" alt="城市街景" />
            <div>
              <p id="phaseLabel">第一階段：單身生活</p>
              <h2 id="sceneTitle">開場</h2>
            </div>
          </header>
          <article id="story" class="story"></article>
          <div id="choices" class="choices"></div>
          <form id="freeForm" class="free-form">
            <input id="freeInput" type="text" placeholder="輸入自訂行動，例如：回覆危險訊息、隱藏限動、過夜、坦白或報復。" />
            <button type="submit">送出</button>
          </form>
        </section>
      </section>

      <section id="endingPage" class="ending-page hidden">
        <div class="ending-art">
          <img id="endingAvatar" src="assets/lead-cutout.png" alt="大結局角色頭像" />
        </div>
        <article class="ending-copy">
          <p id="endingBadge">大結局</p>
          <h2 id="endingTitle">大結局</h2>
          <strong id="endingFocus">你</strong>
          <div id="endingStory"></div>
          <div class="ending-actions">
            <button id="endingRestart" type="button">重新開始新周目</button>
            <button id="endingBack" type="button">回到劇情紀錄</button>
          </div>
        </article>
      </section>

      <div id="deltaPopup" class="delta-popup hidden" role="status" aria-live="polite">
        <div>
          <span>數值變動</span>
          <section id="deltaPopupText" class="delta-popup-list"></section>
          <button id="deltaPopupClose" type="button">知道了</button>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
